name: Data Ingest Service CICD
on:
  push:
    branches:
      - main

jobs:
  data-ingest-service:
    name: Data Ingest Service CICD
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Print test message
        run: echo "Data Ingest Service CICD"

      - name: Calculate Git Short SHA
        id: get-sha
        run: echo "short_sha=$(echo "${{ github.sha }}" | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.ACR_SERVER }}
          username: ${{ secrets.AZURE_CLIENT_ID }}
          password: ${{ secrets.AZURE_CLIENT_SECRET }}

      - name: Build and Push Docker Image
        run: |
          ACR_SERVER="${{ secrets.ACR_SERVER }}"
          
          IMAGE_SHA="$ACR_SERVER/data-ingest-service:${{ steps.get-sha.outputs.short_sha }}"
          IMAGE_LATEST="$ACR_SERVER/data-ingest-service:latest"
          
          docker build -t $IMAGE_SHA -t $IMAGE_LATEST .
          docker push $IMAGE_SHA
          docker push $IMAGE_LATEST
      - name: Log in to Azure CLI
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}"}'

      - name: Deploy to Azure Container App
        run: |
          az containerapp update \
            --name "app-data-ingest-service" \
            --resource-group "rg-rooftop-kms-training" \
            --container-name "data-ingest-service" \
            --image "${{ secrets.ACR_SERVER }}/data-ingest-service:${{ steps.get-sha.outputs.short_sha }}"
            --revision-mode "single" \
            --traffic-weight "latest=100"